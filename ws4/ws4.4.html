<html>
    <head>
        
    </head>
    <body>
        <h1>มหาวิทยาลัยราชภัฏนครปฐม</h1>
        <img src="https://i.imgflip.com/5t0ghc.gif">
        <input id="score" type="text" placeholder="ใส่คะแนนเพื่อคำนวณเกรด">
        <button>sumbit</button>
        <h1 id="grade">Grade: </h1>
        <script>
            const scoreInput = document.querySelector("#score");
            const submitBtn = document.querySelector("button");
            const gradeDisplay = document.querySelector("#grade");

            submitBtn.addEventListener("click", () => {
                let score = parseFloat(scoreInput.value);
                let grade = "";

            if (isNaN(score) || score < 0 || score > 100) {
            grade = "โปรดใส่คะแนน 0-100";
            } else if (score >= 80) {
            grade = "A";
            } else if (score >= 70) {
            grade = "B";
            } else if (score >= 60) {
            grade = "C";
            } else if (score >= 50) {
            grade = "D";
            } else {
            grade = "F";
            }

        gradeDisplay.textContent = "Grade: " + grade;
    });
</script>
        </script> 
    </body> 
</html>
